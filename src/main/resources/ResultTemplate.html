<!DOCTYPE html>
<html lang = "en">

    <head>

        <meta charset = "UTF-8">
        <title>Simulation results</title>
        <script src = "https://cdn.jsdelivr.net/npm/chart.js"></script>

        <style>

            * {

                box-sizing: border-box;
            }

            body {

                margin: 0;
                padding: 24px;
                font-family: Arial, Helvetica, sans-serif;
                background: #f5f5f5;
            }

            h1 {

                margin-top: 0;
            }

            #charts {

                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(1000px, 1fr));
                gap: 24px;
            }

            .chart-card {

                background: white;
                border-radius: 8px;
                padding: 20px;
                box-shadow: 0 2px 8px rgba(0,0,0,.15);
            }

            .chart-title {

                margin-bottom: 16px;
                font-size: 20px;
                font-weight: bold;
            }

            canvas {

                width: 100%;
                height: 400px;
            }

        </style>

    </head>

    <body>

        <h1>Simulation results</h1>
        <div id = "charts"></div>

        <script>

            const chartData = __CHART_DATA__;

            const COLORS = [

                "#4e79a7",
                "#f28e2b",
                "#e15759",
                "#76b7b2",
                "#59a14f",
                "#edc949",
                "#af7aa1",
                "#ff9da7",
                "#9c755f",
                "#bab0ab"
            ];

            const chartsContainer = document.getElementById("charts");
            let colorIndex = 0;

            for(const [title, chart] of Object.entries(chartData)) {

                const card = document.createElement("div");
                card.className = "chart-card";

                const titleDiv = document.createElement("div");
                titleDiv.className = "chart-title";
                titleDiv.textContent = title;

                const canvas = document.createElement("canvas");

                card.appendChild(titleDiv);
                card.appendChild(canvas);
                chartsContainer.appendChild(card);

                const datasets = chart.datasets.map(ds => {

                    const color = COLORS[colorIndex % COLORS.length];
                    colorIndex++;

                    return {

                        label: ds.label,
                        data: ds.data,
                        backgroundColor: color,
                        borderColor: color,
                        borderWidth: 1
                    };
                });

                new Chart(canvas, {

                    type: "bar",

                    data: {

                        labels: chart.labels,
                        datasets: datasets
                    },

                    options: {

                        responsive: true,

                        plugins: {

                            legend: {

                                position: "bottom"
                            }
                        },

                        scales: {

                            x: {

                                stacked: true
                            },

                            y: {

                                stacked: true,
                                beginAtZero: true
                            }
                        }
                    }
                });
            }

        </script>

    </body>

</html>
